mutation Register($input: UserInput!) {
  register(input: $input) {
    errors {
      field
      message
    }
    user {
      email
      username
      createdAt
      updatedAt
    }
  }
}

mutation Login($username: String!, $password: String!) {
  login(username: $username, password: $password) {
    errors {
      field
      message
    }
    user {
      id
      username
      email
    }
  }
}